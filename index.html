<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1d4c35" />
  <meta name="description" content="Anvira Oils - cold pressed oils. Tap to call, WhatsApp, or visit Instagram." />
  <title>Anvira Oils</title>
  <style>
    :root {
      --bg: #f5f0e5;
      --bg-2: #ece4d1;
      --green: #1d4c35;
      --green-2: #245c40;
      --gold: #d7a521;
      --gold-2: #f0c24d;
      --ink: #163424;
      --card: rgba(255, 252, 245, 0.78);
      --border: rgba(29, 76, 53, 0.12);
      --shadow: 0 24px 60px rgba(18, 45, 31, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(215, 165, 33, 0.16), transparent 36%),
        radial-gradient(circle at 85% 15%, rgba(29, 76, 53, 0.15), transparent 28%),
        linear-gradient(160deg, var(--bg), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 18px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(29, 76, 53, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(29, 76, 53, 0.03) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.25), transparent 70%);
    }

    .page {
      width: min(100%, 680px);
      position: relative;
      z-index: 1;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 32px;
      background: var(--card);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      padding: 28px 20px 22px;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: auto -20% -30% auto;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(215, 165, 33, 0.15), transparent 68%);
      filter: blur(8px);
      pointer-events: none;
    }

    .brand {
      display: grid;
      justify-items: center;
      gap: 14px;
      text-align: center;
      padding: 4px 6px 8px;
    }

    .logo {
      width: min(52vw, 230px);
      aspect-ratio: 1 / 1;
      object-fit: contain;
      filter: drop-shadow(0 10px 22px rgba(19, 44, 30, 0.15));
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(29, 76, 53, 0.08);
      color: var(--green);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--gold);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.4rem);
      line-height: 1;
      color: var(--green);
      letter-spacing: -0.04em;
    }

    .actions {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }

    .button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      width: 100%;
      padding: 18px 20px;
      border-radius: 20px;
      text-decoration: none;
      border: 1px solid rgba(29, 76, 53, 0.12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(246, 240, 227, 0.92)),
        linear-gradient(135deg, rgba(29, 76, 53, 0.05), rgba(215, 165, 33, 0.06));
      color: var(--ink);
      box-shadow: 0 10px 22px rgba(18, 45, 31, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.75);
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background 180ms ease;
      min-height: 82px;
      cursor: pointer;
      overflow: hidden;
    }

    .button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.34), transparent 38%);
      opacity: 0.85;
      pointer-events: none;
    }

    .button::after {
      content: "";
      position: absolute;
      right: 18px;
      top: 50%;
      width: 10px;
      height: 10px;
      border-right: 2px solid rgba(29, 76, 53, 0.45);
      border-top: 2px solid rgba(29, 76, 53, 0.45);
      transform: translateY(-50%) rotate(45deg);
      transition: transform 180ms ease, border-color 180ms ease;
      pointer-events: none;
    }

    .button strong {
      display: block;
      font-size: 1.05rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .button span {
      display: block;
      margin-top: 4px;
      font-size: 0.92rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: rgba(22, 52, 36, 0.72);
    }

    .button .icon {
      width: 58px;
      height: 58px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: #fff;
      background: linear-gradient(135deg, var(--green), var(--green-2));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        0 10px 20px rgba(18, 45, 31, 0.14);
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .button .icon svg {
      width: 31px;
      height: 31px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.85;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .button .icon.phone {
      background: linear-gradient(135deg, #245c40, #1d4c35);
    }

    .button .icon.whatsapp {
      background: linear-gradient(135deg, #1fa65a, #168347);
    }

    .button .icon.instagram {
      background: linear-gradient(135deg, #d67b1e, #f0a93b);
    }

    .button:hover,
    .button:focus-visible {
      transform: translateY(-3px);
      box-shadow: 0 18px 38px rgba(18, 45, 31, 0.16), inset 0 1px 0 rgba(255, 255, 255, 0.88);
      border-color: rgba(215, 165, 33, 0.45);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(245, 239, 226, 0.96)),
        linear-gradient(135deg, rgba(29, 76, 53, 0.08), rgba(215, 165, 33, 0.1));
      outline: none;
    }

    .button:hover::after,
    .button:focus-visible::after {
      transform: translateY(-50%) rotate(45deg) translate(1px, -1px);
      border-color: rgba(29, 76, 53, 0.7);
    }

    .button:active {
      transform: translateY(-1px) scale(0.995);
      box-shadow: 0 12px 22px rgba(18, 45, 31, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.82);
    }

    .button:active .icon {
      transform: scale(0.98);
    }

    .button > div:first-child {
      position: relative;
      z-index: 1;
      padding-right: 34px;
    }

    .footer {
      display: flex;
      justify-content: center;
      margin-top: 18px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 0.88rem;
      color: rgba(22, 52, 36, 0.66);
    }

    @media (max-width: 560px) {
      body {
        padding: 12px;
      }

      .card {
        border-radius: 26px;
        padding: 20px 14px 16px;
      }

      .button {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card" aria-label="Anvira Oils contact page">
      <div class="brand">
        <img class="logo" src="ANVIRA%20Final%20logo%201.png" alt="Anvira Oils logo" loading="eager" decoding="async" />
        <div class="eyebrow">Cold pressed oils</div>
        <h1>Tap to connect with Anvira Oils</h1>
      </div>

      <div class="actions" role="list" aria-label="Contact actions">
        <a class="button" href="tel:+919099759175" role="listitem" aria-label="Call Anvira Oils on +91 9099759175">
          <div>
            <strong>Call now</strong>
            <span>Speak directly at +91 9099759175</span>
          </div>
          <div class="icon phone" aria-hidden="true">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M6.9 3.7l2.3 2.3c.5.5.6 1.2.2 1.8l-1.3 1.9a14.9 14.9 0 0 0 5.4 5.4l1.9-1.3c.6-.4 1.4-.3 1.8.2l2.3 2.3c.5.5.6 1.3.2 1.9-.8 1.3-2.2 2-3.6 2-6.8 0-12.3-5.5-12.3-12.3 0-1.4.7-2.8 2-3.6.6-.4 1.4-.3 1.9.2Z" />
              <path d="M14.8 9.2c-.2-.4-.5-.7-.9-.9l-1.1-.5c-.4-.2-.9 0-1.1.3l-.6.9c-.2.3-.2.7 0 1 1 1.8 2.7 3.5 4.5 4.5.3.2.7.2 1 0l.9-.6c.3-.2.5-.7.3-1.1l-.5-1.1c-.2-.4-.5-.7-.9-.9l-.7-.4Z" />
            </svg>
          </div>
        </a>

        <a class="button" href="https://wa.me/919099759175?text=Hi%20Anvira%20Oils%2C%20I%20would%20like%20to%20know%20more." target="_blank" rel="noopener noreferrer" role="listitem" aria-label="Message Anvira Oils on WhatsApp">
          <div>
            <strong>WhatsApp</strong>
            <span>Send a message on WhatsApp</span>
          </div>
          <div class="icon whatsapp" aria-hidden="true">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 4.2a7.8 7.8 0 0 0-6.7 11.8L4 20l4-1.2A7.8 7.8 0 1 0 12 4.2Z" />
              <path d="M8.8 8.8c.2-.4.5-.6.9-.6h.6c.3 0 .5.1.6.4l.8 1.8c.1.3.1.5-.1.7l-.4.5c.6 1 1.5 1.9 2.5 2.5l.5-.4c.2-.2.4-.2.7-.1l1.8.8c.3.1.4.3.4.6v.6c0 .4-.2.7-.6.9-.5.2-1 .4-1.8.4-3.4 0-6.1-2.7-6.1-6.1 0-.8.1-1.3.4-1.8Z" />
            </svg>
          </div>
        </a>

        <a class="button" href="https://instagram.com/anviraoils" target="_blank" rel="noopener noreferrer" role="listitem" aria-label="Open the Anvira Oils Instagram page">
          <div>
            <strong>Instagram</strong>
            <span>Visit @anviraoils on Instagram for updates</span>
          </div>
          <div class="icon instagram" aria-hidden="true">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <rect x="4.8" y="4.8" width="14.4" height="14.4" rx="4.2" />
              <circle cx="12" cy="12" r="3.25" />
              <circle cx="16.9" cy="7.1" r="1.05" fill="currentColor" stroke="none" />
            </svg>
          </div>
        </a>
      </div>

    </section>

    <div class="footer">Anvira Oils</div>
  </main>
</body>
</html>
